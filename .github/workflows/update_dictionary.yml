name: Update PoE2 Translation Dictionary

# 하루 한 번(자정) 실행 & 수동 실행 허용
on:
  schedule:
    # 매일 UTC 00:00 (한국시간 오전 9시)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-dictionary:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3
        
      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client pytz aiohttp google-api-python-client google-auth-httplib2 google-auth-oauthlib
          
      - name: 1. 아이템 번역 데이터 크롤링
        run: python Translator/get_poe2db_translations.py
          
      - name: 2. 패시브 노드 번역 데이터 크롤링
        run: python Translator/get_poe2_passives.py
          
      - name: 3. 구글 드라이브 파일 덮어쓰기 업로드
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python Translator/upload_dict_to_drive.py
