name: Update PoE2 Ninja Prices

# 외부 스케줄러(cron-job.org) 연동으로 인한 자동 스케줄 삭제. 수동 실행만 허용.
on:
  workflow_dispatch: # 깃허브 페이지에서 버튼으로 수동 실행 (또는 외부 API 호출)할 수 있게 함

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 저장소 코드 가져오기 (Checkout repo)
        uses: actions/checkout@v3
        
      - name: 파이썬 설치 (Set up Python)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 패키지 설치 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client pytz aiohttp
          
      - name: 닌자 시세 봇 실행 (Run ninja bot)
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python -u poe2_ninja_detail_bot.py
        
      - name: 변경된 로컬 파일 깃허브 저장소에 반영 (Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ninja JSON files [skip ci]" && git push)
